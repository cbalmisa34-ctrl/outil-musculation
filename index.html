<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BF Tracker"/>
<meta name="theme-color" content="#070707"/>
<title>Basic Fit Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#070707;height:100%;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;color:#fff;}
#app{background:#070707;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,20px);}

.header{padding:calc(14px + env(safe-area-inset-top,0px)) 18px 12px;border-bottom:1px solid #161616;display:flex;align-items:center;gap:12px;background:#070707;position:sticky;top:0;z-index:50;}
.header-info{flex:1;min-width:0;}
.htitle{font-weight:900;font-size:19px;letter-spacing:2px;}
.hsub{font-size:10px;color:#555;letter-spacing:1px;margin-top:2px;}
.accent{color:#FF4500;}
.back-btn,.icon-btn{background:none;border:none;color:#FF4500;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;padding:4px 0;white-space:nowrap;flex-shrink:0;}
.icon-btn{font-size:18px;padding:4px 6px;}

.planner-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:14px;}
.day-card{background:#0e0e0e;border-radius:14px;padding:13px 12px;border:1px solid #1c1c1c;min-height:130px;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.day-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,transparent);}
.day-card.today{border-color:#FF4500;box-shadow:0 0 14px rgba(255,69,0,.18);}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.day-name{font-weight:800;font-size:12px;letter-spacing:1.5px;color:#666;}
.today-badge{background:#FF4500;color:#fff;font-size:7px;font-weight:900;padding:2px 5px;border-radius:4px;}
.mpills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.mpill{font-weight:800;font-size:11px;letter-spacing:.5px;padding:2px 7px;border-radius:5px;border:1px solid;}
.ex-count{font-size:10px;color:#555;margin-bottom:7px;}
.day-actions{display:flex;gap:6px;margin-top:auto;}
.btn-go{background:var(--cc,#FF4500);border:none;color:#000;font-weight:900;font-size:12px;letter-spacing:1px;padding:7px 10px;border-radius:7px;cursor:pointer;flex:1;}
.btn-sm{background:#1a1a1a;border:1px solid #2a2a2a;color:#888;font-size:12px;padding:6px 9px;border-radius:7px;cursor:pointer;}
.btn-dashed{background:none;border:1px dashed #252525;color:#444;font-size:12px;padding:8px;border-radius:8px;cursor:pointer;width:100%;margin-top:auto;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:#111;border-radius:18px 18px 0 0;padding:20px 18px calc(32px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;max-height:82vh;overflow-y:auto;}
.sheet-handle{width:36px;height:3px;background:#2a2a2a;border-radius:2px;margin:0 auto 18px;}
.sheet-title{font-weight:800;font-size:13px;letter-spacing:2px;color:#555;margin-bottom:14px;text-transform:uppercase;}

.mtoggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mtoggle{background:#161616;border:1px solid #252525;border-left:3px solid var(--mc,#555);color:#fff;padding:12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:800;letter-spacing:1px;text-align:left;display:flex;align-items:center;justify-content:space-between;}
.mtoggle.on{background:#1a1a1a;} .mtoggle .ck{color:#00FF88;font-size:14px;}
.btn-done{background:#FF4500;border:none;color:#000;font-weight:900;font-size:15px;letter-spacing:2px;padding:14px;border-radius:10px;cursor:pointer;width:100%;margin-top:14px;}

.mach-list{display:flex;flex-direction:column;gap:7px;}
.mach-item{background:#161616;border:1px solid #252525;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:3px;}
.mach-name{font-size:15px;font-weight:700;color:#fff;}
.mach-alt{font-size:11px;color:#FF8C00;}
.custom-box{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.custom-sep{display:flex;align-items:center;gap:10px;color:#333;font-size:11px;letter-spacing:1px;}
.custom-sep::before,.custom-sep::after{content:'';flex:1;height:1px;background:#222;}
.custom-input{background:#161616;border:1px solid #2a2a2a;color:#fff;font-size:16px;font-weight:700;padding:13px 14px;border-radius:10px;width:100%;}
.custom-input:focus{outline:none;border-color:#FF4500;}
.custom-input::placeholder{color:#333;font-weight:400;font-size:14px;}
.btn-custom{background:#1a1a1a;border:1px solid #333;color:#FF4500;font-weight:800;font-size:14px;letter-spacing:1.5px;padding:13px;border-radius:10px;cursor:pointer;width:100%;}
.btn-custom:disabled{opacity:.35;}

.msub-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.msub-btn{background:#161616;border:1px solid;border-radius:10px;padding:13px 10px;cursor:pointer;font-size:14px;font-weight:800;letter-spacing:1px;}

.content{padding:14px;display:flex;flex-direction:column;gap:10px;}
.empty-st{text-align:center;color:#444;padding:48px 20px;font-size:14px;line-height:1.7;}
.empty-st .ico{display:block;font-size:32px;margin-bottom:10px;}
.msect{display:flex;flex-direction:column;gap:8px;}
.msect-hd{display:flex;align-items:center;gap:8px;padding:4px 0;}
.msect-bar{flex:1;height:1px;background:#1a1a1a;}
.msect-lbl{font-weight:900;font-size:11px;letter-spacing:2px;white-space:nowrap;}
.ex-card{background:#0e0e0e;border:1px solid #1c1c1c;border-radius:12px;padding:11px 12px;display:flex;align-items:center;gap:10px;}
.ex-thumb{width:52px;height:52px;background:#161616;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;cursor:pointer;}
.ex-thumb img{width:100%;height:100%;object-fit:cover;}
.ex-body{flex:1;min-width:0;cursor:pointer;}
.ex-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-last{font-size:11px;color:#777;margin-top:2px;}
.ex-cnt{font-size:10px;color:#444;margin-top:2px;}
.ex-del{background:#160000;border:1px solid #2a0000;color:#ff3333;font-size:14px;padding:8px 10px;border-radius:8px;cursor:pointer;flex-shrink:0;}
.btn-add-ex{background:none;border:1px dashed #252525;color:#FF4500;font-weight:700;font-size:14px;letter-spacing:1px;padding:15px;border-radius:10px;cursor:pointer;width:100%;}

.photo-zone{border-radius:12px;overflow:hidden;background:#111;border:1px solid #1c1c1c;cursor:pointer;position:relative;min-height:80px;}
.photo-zone img{width:100%;max-height:230px;object-fit:cover;display:block;}
.photo-empty{height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#3a3a3a;}
.photo-empty .pi{font-size:36px;} .photo-empty .pt{font-size:12px;letter-spacing:1px;}
.photo-badge{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;padding:4px 8px;border-radius:20px;}
.rename-bar{display:flex;gap:7px;align-items:center;}
.rename-inp{background:#111;border:1px solid #2a2a2a;color:#fff;font-size:15px;font-weight:700;padding:10px 12px;border-radius:9px;flex:1;}
.rename-inp:focus{outline:none;border-color:#FF4500;}
.btn-rename{background:#FF4500;border:none;color:#000;font-weight:900;font-size:13px;letter-spacing:1px;padding:10px 14px;border-radius:9px;cursor:pointer;white-space:nowrap;}
.alt-pill{background:#120900;border:1px solid rgba(255,140,0,.25);border-radius:10px;padding:10px 13px;font-size:12px;color:#FF8C00;display:flex;gap:8px;align-items:flex-start;}
.alt-pill b{color:#FFB84D;}
.slbl{font-weight:800;font-size:11px;letter-spacing:2.5px;color:#444;padding-top:4px;}
.log-row{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:7px;}
.log-f{display:flex;flex-direction:column;gap:5px;}
.log-f label{font-size:10px;color:#555;letter-spacing:1px;font-weight:600;}
.log-inp{background:#111;border:1px solid #222;color:#fff;font-size:20px;font-weight:900;padding:10px;border-radius:9px;width:100%;text-align:center;}
.log-inp:focus{outline:none;border-color:#FF4500;}
.log-inp::placeholder{color:#333;font-size:14px;}
.btn-save{border:none;color:#000;font-weight:900;font-size:15px;letter-spacing:2px;padding:14px;border-radius:10px;cursor:pointer;width:100%;}
.hist-stack{display:flex;flex-direction:column;gap:6px;}
.hist-row{background:#0e0e0e;border:1px solid #1a1a1a;border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:8px;}
.hist-date{font-size:10px;color:#444;flex-shrink:0;min-width:68px;}
.hist-kg{font-weight:900;font-size:19px;flex-shrink:0;}
.hist-det{font-size:11px;color:#666;flex:1;}
.hist-del{background:none;border:none;color:#3a0000;font-size:14px;cursor:pointer;padding:4px 6px;border-radius:6px;flex-shrink:0;}
.btn-del-ex{background:#160000;border:1px solid #2a0000;color:#ff4444;font-weight:800;font-size:14px;letter-spacing:1.5px;padding:13px;border-radius:10px;cursor:pointer;width:100%;}
.btn-coach{background:linear-gradient(135deg,#130800,#1f0f00);border:1px solid rgba(255,69,0,.5);color:#FF4500;font-weight:800;font-size:15px;letter-spacing:2px;padding:14px;border-radius:10px;cursor:pointer;width:100%;}
.btn-coach:disabled{opacity:.5;}
.ai-card{background:#080d08;border:1px solid rgba(0,200,80,.15);border-radius:12px;padding:15px 14px;font-size:13px;color:#bbb;line-height:1.65;white-space:pre-wrap;}
.ai-head{display:flex;align-items:center;gap:7px;margin-bottom:10px;font-weight:800;font-size:12px;letter-spacing:1.5px;color:#00CC55;}
.confirm-box{background:#151515;border:1px solid #2a2a2a;border-radius:14px;padding:20px 18px;display:flex;flex-direction:column;gap:12px;}
.confirm-msg{font-size:14px;color:#ccc;text-align:center;line-height:1.5;}
.confirm-msg b{color:#fff;}
.confirm-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-cancel{background:#1a1a1a;border:1px solid #2a2a2a;color:#888;font-weight:800;font-size:14px;letter-spacing:1px;padding:13px;border-radius:10px;cursor:pointer;}
.btn-danger{background:#2a0000;border:1px solid #440000;color:#ff4444;font-weight:800;font-size:14px;letter-spacing:1px;padding:13px;border-radius:10px;cursor:pointer;}
.api-input{background:#161616;border:1px solid #2a2a2a;color:#fff;font-size:13px;padding:12px 14px;border-radius:10px;width:100%;margin-bottom:8px;}
.api-input:focus{outline:none;border-color:#FF4500;}
.api-note{font-size:11px;color:#555;line-height:1.5;margin-top:4px;}
.api-note a{color:#FF8C00;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,69,0,.3);border-top-color:#FF4500;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.banner{background:#0d0d0d;border-bottom:1px solid #1c1c1c;padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:12px;color:#888;}
.banner b{color:#FF4500;}
.banner button{background:none;border:none;color:#555;font-size:16px;cursor:pointer;margin-left:auto;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#FF4500;border-radius:2px;}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none">
<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const DAYS_FR  = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const DAY_KEYS = ['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
const MUSCLES = [
  {key:'chest',    label:'Pectoraux',  short:'PECS',    color:'#FF4500'},
  {key:'back',     label:'Dos',        short:'DOS',     color:'#FF8C00'},
  {key:'legs',     label:'Jambes',     short:'LEGS',    color:'#FFD700'},
  {key:'shoulders',label:'Épaules',    short:'ÉPAULES', color:'#00BFFF'},
  {key:'biceps',   label:'Biceps',     short:'BICEPS',  color:'#00FF88'},
  {key:'triceps',  label:'Triceps',    short:'TRICEPS', color:'#FF00CC'},
  {key:'core',     label:'Abdominaux', short:'ABDOS',   color:'#9944FF'},
  {key:'glutes',   label:'Fessiers',   short:'FESSIERS',color:'#FF6B9D'},
  {key:'rest',     label:'Repos',      short:'REPOS 😴',color:'#444'},
];
const MACHINES = {
  chest:[
    {name:'Pec Deck (Butterfly)',            alt:'Chest Press Machine'},
    {name:'Chest Press Machine',             alt:'Pec Deck'},
    {name:'Smith Machine développé couché',  alt:'Chest Press Machine'},
    {name:'Cable Crossover haute poulie',    alt:'Pec Deck'},
    {name:'Incline Chest Press Machine',     alt:'Chest Press Machine'},
  ],
  back:[
    {name:'Lat Pulldown (tirage nuque)',     alt:'Rowing câble assis'},
    {name:'Rowing câble assis',              alt:'Lat Pulldown'},
    {name:'Tirage poitrine machine',         alt:'Lat Pulldown'},
    {name:'Cable Row basse poulie',          alt:'Rowing câble assis'},
    {name:'Back Extension Machine',          alt:'Rowing câble assis'},
  ],
  legs:[
    {name:'Leg Press 45°',                  alt:'Smith Machine Squat'},
    {name:'Leg Extension',                   alt:'Hack Squat Machine'},
    {name:'Leg Curl couché',                 alt:'Leg Curl assis'},
    {name:'Leg Curl assis',                  alt:'Leg Curl couché'},
    {name:'Hack Squat Machine',              alt:'Leg Press 45°'},
    {name:'Smith Machine Squat',             alt:'Leg Press 45°'},
    {name:'Calf Raise Machine',              alt:'Smith Machine Calf Raise'},
  ],
  shoulders:[
    {name:'Shoulder Press Machine',          alt:'Smith Machine OHP'},
    {name:'Lateral Raise Machine',           alt:'Cable Lateral Raise'},
    {name:'Cable Lateral Raise',             alt:'Lateral Raise Machine'},
    {name:'Rear Delt Machine',               alt:'Pec Deck inversé'},
    {name:'Smith Machine Overhead Press',    alt:'Shoulder Press Machine'},
  ],
  biceps:[
    {name:'Curl Machine Larry Scott',        alt:'Cable Curl'},
    {name:'Cable Curl basse poulie',         alt:'Curl Machine'},
    {name:'Barre EZ Bicep Curl',             alt:'Cable Curl'},
    {name:'Hammer Curl câble',               alt:'Curl Machine'},
  ],
  triceps:[
    {name:'Tricep Pushdown câble',           alt:'Overhead Extension câble'},
    {name:'Overhead Tricep Extension câble', alt:'Tricep Pushdown câble'},
    {name:'Dip Machine',                     alt:'Tricep Pushdown câble'},
    {name:'Tricep Machine (presse)',         alt:'Dip Machine'},
  ],
  core:[
    {name:'Ab Crunch Machine',               alt:'Cable Crunch'},
    {name:'Cable Crunch haute poulie',       alt:'Ab Crunch Machine'},
    {name:"Captain's Chair (relevé genoux)", alt:'Ab Crunch Machine'},
    {name:'GHD / Roman Chair',               alt:'Back Extension Machine'},
    {name:'Planche / Gainage (au sol)',      alt:'Ab Crunch Machine'},
    {name:'Russian Twist (poids libre)',     alt:'Cable Crunch'},
  ],
  glutes:[
    {name:'Hip Thrust Machine',              alt:'Smith Machine Hip Thrust'},
    {name:'Smith Machine Hip Thrust',        alt:'Hip Thrust Machine'},
    {name:'Glute Kickback Machine',          alt:'Cable Kickback'},
    {name:'Cable Kickback (basse poulie)',   alt:'Glute Kickback Machine'},
    {name:'Abducteur Machine',               alt:'Cable Kickback'},
    {name:'Leg Press pieds hauts (fessiers)',alt:'Hip Thrust Machine'},
    {name:'Squat Sumo Smith Machine',        alt:'Leg Press pieds hauts'},
  ],
};

// ─── STATE ───────────────────────────────────────────────────────────────────
const S = {
  screen:'planner', weekPlan:{}, exs:{},
  activeDay:null, activeEx:null,
  muscleMenu:null, addStep:null, addMuscle:null,
  confirmDel:null, renaming:false,
  aiText:'', aiLoading:false,
  showBanner:!navigator.standalone,
  showSettings:false,
};
// Input values (updated on keypress, not triggering render)
const IN = {kg:'', reps:'10', sets:'3', custom:'', rename:''};

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function load() {
  try {
    const p = localStorage.getItem('bft_plan2');
    if (p) { const r=JSON.parse(p); S.weekPlan=migrate(r); }
  } catch(e){}
  try {
    const e = localStorage.getItem('bft_exs');
    if (e) S.exs = JSON.parse(e);
  } catch(e){}
  try {
    const k = localStorage.getItem('bft_apikey');
    if (k) S.apiKey = k;
  } catch(e){}
}
function saveData() {
  try { localStorage.setItem('bft_plan2', JSON.stringify(S.weekPlan)); } catch(e){}
  try { localStorage.setItem('bft_exs',   JSON.stringify(S.exs));      } catch(e){}
}
function migrate(raw) {
  if (!raw) return {};
  const out={};
  Object.keys(raw).forEach(k=>{
    const v=raw[k];
    if (Array.isArray(v)) out[k]=v;
    else if (v==='rest')  out[k]=['rest'];
    else if (typeof v==='string') out[k]=[v];
  });
  return out;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const h = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getM      = k  => MUSCLES.find(m=>m.key===k);
const dayMs     = d  => (S.weekPlan[d]||[]).filter(k=>k!=='rest');
const isRest    = d  => { const a=S.weekPlan[d]||[]; return a.length===0||(a.length===1&&a[0]==='rest'); };
const totalExs  = d  => dayMs(d).reduce((a,mk)=>a+(S.exs[`${d}__${mk}`]||[]).length,0);
const exKey     = () => S.activeDay&&S.activeEx ? `${S.activeDay}__${S.activeEx.muscleKey}` : null;
const todayIdx  = () => (new Date().getDay()+6)%7;
const machAlt   = () => {
  if (!S.activeEx) return '';
  return (MACHINES[S.activeEx.muscleKey]||[]).find(mc=>mc.name===S.activeEx.name)?.alt||'';
};

// ─── IMAGE ───────────────────────────────────────────────────────────────────
function compressImage(file) {
  return new Promise(res => {
    const img=new Image(), c=document.createElement('canvas');
    img.onload=()=>{
      const MAX=480, s=Math.min(MAX/img.width,MAX/img.height,1);
      c.width=img.width*s; c.height=img.height*s;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',0.72));
    };
    img.src=URL.createObjectURL(file);
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
let prevScreen = null;
function render() {
  const scrollY = S.screen===prevScreen ? window.scrollY : 0;
  prevScreen = S.screen;
  const app = document.getElementById('app');
  if (!app) return;
  app.innerHTML = buildHTML();
  window.scrollTo(0, scrollY);
}

function buildHTML() {
  if (S.screen==='planner')  return pagePlanner();
  if (S.screen==='day')      return pageDay();
  if (S.screen==='exercise') return pageExercise();
  return '';
}

// ── PLANNER ──────────────────────────────────────────────────────────────────
function pagePlanner() {
  const ti = todayIdx();
  const cards = DAY_KEYS.map((d,i)=>{
    const muscles=dayMs(d), rest=isRest(d), isToday=i===ti;
    const exCount=totalExs(d), cc=muscles.length>0?(getM(muscles[0])?.color||'#333'):'#333';
    const pills = muscles.map(mk=>{const m=getM(mk);return`<span class="mpill" style="color:${m.color};border-color:${m.color}55">${h(m.short)}</span>`;}).join('');
    const inner = rest
      ? `${(S.weekPlan[d]||[]).includes('rest')?'<div style="color:#444;font-weight:800;font-size:18px;margin-bottom:8px">REPOS 😴</div>':''}
         <button class="btn-dashed" data-a="open-mmenu" data-day="${d}">${(S.weekPlan[d]||[]).length===0?'+ Assigner':'✏️ Modifier'}</button>`
      : `<div class="mpills">${pills}</div>
         ${exCount>0?`<div class="ex-count">${exCount} exercice${exCount>1?'s':''}</div>`:''}
         <div class="day-actions">
           <button class="btn-go" style="--cc:${cc}" data-a="open-day" data-day="${d}">VOIR →</button>
           <button class="btn-sm" data-a="open-mmenu" data-day="${d}">✏️</button>
         </div>`;
    return `<div class="day-card${isToday?' today':''}" style="--cc:${cc}">
      <div class="day-header">
        <span class="day-name">${DAYS_FR[i].toUpperCase()}</span>
        ${isToday?'<span class="today-badge">TODAY</span>':''}
      </div>${inner}</div>`;
  }).join('');

  const mmenu = S.muscleMenu ? `
    <div class="overlay" data-a="close-overlay">
      <div class="sheet" data-stop>
        <div class="sheet-handle"></div>
        <div class="sheet-title">Groupes musculaires — ${DAYS_FR[DAY_KEYS.indexOf(S.muscleMenu)]}</div>
        <div class="mtoggle-grid">
          ${MUSCLES.map(m=>{
            const on=(S.weekPlan[S.muscleMenu]||[]).includes(m.key);
            return`<button class="mtoggle${on?' on':''}" style="--mc:${m.color}" data-a="toggle-m" data-day="${S.muscleMenu}" data-mkey="${m.key}">
              <span style="color:${m.color}">${h(m.short)}</span><span class="ck">${on?'✓':''}</span></button>`;
          }).join('')}
        </div>
        <button class="btn-done" data-a="close-overlay">VALIDER</button>
      </div>
    </div>` : '';

  const settings = S.showSettings ? renderSettings() : '';

  return `
    ${S.showBanner?`<div class="banner"><span>📲 Safari → <b>Partager</b> → Sur l'écran d'accueil</span><button data-a="hide-banner">✕</button></div>`:''}
    <header class="header">
      <div class="header-info">
        <div class="htitle"><span class="accent">⚡</span> BASIC FIT TRACKER</div>
        <div class="hsub">MA SEMAINE D'ENTRAÎNEMENT</div>
      </div>
      <button class="icon-btn" data-a="open-settings" title="Clé API Coach IA">⚙️</button>
    </header>
    <div class="planner-grid">${cards}</div>
    ${mmenu}${settings}`;
}

function renderSettings() {
  const k = localStorage.getItem('bft_apikey')||'';
  return `
    <div class="overlay" data-a="close-overlay">
      <div class="sheet" data-stop>
        <div class="sheet-handle"></div>
        <div class="sheet-title">⚙️ Clé API — Coach IA</div>
        <input id="api-key-inp" class="api-input" type="password" placeholder="sk-ant-api03-..." value="${h(k)}">
        <button class="btn-done" data-a="save-apikey">ENREGISTRER</button>
        <p class="api-note">La clé API est nécessaire pour utiliser le Coach IA hors de Claude.ai.<br>
        Obtiens-la sur <b>console.anthropic.com</b> (compte gratuit disponible).<br>
        Elle est stockée uniquement sur ton téléphone.</p>
      </div>
    </div>`;
}

// ── DAY ───────────────────────────────────────────────────────────────────────
function pageDay() {
  const di = DAY_KEYS.indexOf(S.activeDay);
  const muscles = dayMs(S.activeDay);
  const allEmpty = muscles.every(mk=>(S.exs[`${S.activeDay}__${mk}`]||[]).length===0);
  const subHsub = muscles.map(mk=>{const m=getM(mk);return`<span style="color:${m.color}">${m.label}</span>`;}).join(' + ');

  const sections = muscles.map(mk=>{
    const m=getM(mk);
    const list=(S.exs[`${S.activeDay}__${mk}`]||[]);
    if(!list.length) return '';
    const cards = list.map(ex=>{
      const last=ex.sessions[ex.sessions.length-1];
      const thumb=ex.photo?`<img src="${ex.photo}" alt="">` : '📷';
      const lastTxt=last
        ?`<span style="color:${m.color};font-weight:700">${last.kg} kg</span> · ${last.reps} rép × ${last.sets} séries · ${last.date}`
        :`<span style="color:#3a3a3a">Aucune séance</span>`;
      return `<div class="ex-card">
        <div class="ex-thumb" data-a="open-ex" data-day="${S.activeDay}" data-mid="${mk}" data-eid="${ex.id}">${thumb}</div>
        <div class="ex-body" data-a="open-ex" data-day="${S.activeDay}" data-mid="${mk}" data-eid="${ex.id}">
          <div class="ex-name">${h(ex.name)}</div>
          <div class="ex-last">${lastTxt}</div>
          <div class="ex-cnt">${ex.sessions.length} séance${ex.sessions.length!==1?'s':''}</div>
        </div>
        <button class="ex-del" data-a="ask-del-ex" data-day="${S.activeDay}" data-mid="${mk}" data-eid="${ex.id}">🗑</button>
      </div>`;
    }).join('');
    return `<div class="msect">
      <div class="msect-hd"><div class="msect-bar"></div><span class="msect-lbl" style="color:${m.color}">${m.label.toUpperCase()}</span><div class="msect-bar"></div></div>
      ${cards}
    </div>`;
  }).join('');

  const emptyMsg = allEmpty ? `<div class="empty-st"><span class="ico">🏋️</span>Aucun exercice.<br><span style="font-size:12px;color:#3a3a3a">Ajoute ta première machine ci-dessous.</span></div>` : '';

  // Add exercise overlays
  let overlay = '';
  if (S.confirmDel?.type==='ex-day') {
    const ex = findEx(S.confirmDel.day, S.confirmDel.mid, S.confirmDel.eid);
    overlay = confirmOverlay(`Supprimer <b>${h(ex?.name||'')}</b> et toutes ses séances ?`, 'del-ex-confirm');
  } else if (S.addStep==='muscle') {
    overlay = `<div class="overlay" data-a="close-overlay"><div class="sheet" data-stop>
      <div class="sheet-handle"></div><div class="sheet-title">Quel groupe musculaire ?</div>
      <div class="msub-grid">${muscles.map(mk=>{const m=getM(mk);return`<button class="msub-btn" style="color:${m.color};border-color:${m.color}55" data-a="pick-add-muscle" data-mkey="${mk}">${h(m.short)}</button>`;}).join('')}</div>
    </div></div>`;
  } else if (S.addStep==='machine' && S.addMuscle) {
    const m=getM(S.addMuscle);
    const items=(MACHINES[S.addMuscle]||[]).map(mc=>`
      <button class="mach-item" data-a="add-ex" data-name="${h(mc.name)}">
        <span class="mach-name">${h(mc.name)}</span>
        ${mc.alt?`<span class="mach-alt">🔄 Alt: ${h(mc.alt)}</span>`:''}
      </button>`).join('');
    overlay = `<div class="overlay" data-a="close-overlay"><div class="sheet" data-stop>
      <div class="sheet-handle"></div>
      <div class="sheet-title">Machines Basic Fit — ${h(m?.label||'')}</div>
      <div class="mach-list">${items}</div>
      <div class="custom-box">
        <div class="custom-sep">OU SAISIR MANUELLEMENT</div>
        <input id="custom-inp" class="custom-input" placeholder="Nom de la machine / exercice…" value="${h(IN.custom)}">
        <button class="btn-custom" id="btn-custom-add" data-a="add-ex-custom">➕ AJOUTER CET EXERCICE</button>
      </div>
    </div></div>`;
  }

  return `
    <header class="header">
      <button class="back-btn" data-a="go-planner">← RETOUR</button>
      <div class="header-info">
        <div class="htitle">${DAYS_FR[di].toUpperCase()}</div>
        <div class="hsub">${subHsub}</div>
      </div>
    </header>
    <div class="content">
      ${emptyMsg}${sections}
      <button class="btn-add-ex" data-a="open-add-ex">+ Ajouter un exercice</button>
    </div>
    ${overlay}`;
}

// ── EXERCISE ──────────────────────────────────────────────────────────────────
function pageExercise() {
  const ex = S.activeEx;
  if (!ex) return '';
  const m = getM(ex.muscleKey);
  const alt = machAlt();
  const lastKg = ex.sessions.length>0 ? ex.sessions[ex.sessions.length-1].kg : '';
  const revSess = [...ex.sessions].reverse().slice(0,10);

  const photo = ex.photo
    ? `<img src="${ex.photo}" alt="machine">`
    : `<div class="photo-empty"><span class="pi">📷</span><span class="pt">APPUIE POUR AJOUTER UNE PHOTO</span></div>`;

  const renameBar = S.renaming
    ? `<div class="rename-bar">
        <input id="rename-inp" class="rename-inp" value="${h(IN.rename)}">
        <button class="btn-rename" data-a="do-rename">OK</button>
        <button class="btn-cancel" style="padding:10px 12px;border-radius:9px" data-a="cancel-rename">✕</button>
       </div>`
    : `<button class="btn-sm" style="align-self:flex-start;padding:7px 14px;font-size:12px;letter-spacing:1px" data-a="start-rename">✏️ Renommer la machine</button>`;

  const hist = revSess.length>0 ? `
    <div class="slbl">📈 HISTORIQUE (${ex.sessions.length} séances)</div>
    <div class="hist-stack">
      ${revSess.map((s,i)=>`
        <div class="hist-row">
          <span class="hist-date">${s.date}</span>
          <span class="hist-kg" style="color:${m?.color}">${s.kg} kg</span>
          <span class="hist-det">${s.reps} rép × ${s.sets} séries</span>
          <button class="hist-del" data-a="ask-del-sess" data-idx="${i}">🗑</button>
        </div>`).join('')}
    </div>` : '';

  const aiSection = `
    <div class="slbl">🤖 COACH IA</div>
    ${S.aiLoading
      ? `<button class="btn-coach" disabled><span class="spinner"></span>ANALYSE EN COURS...</button>`
      : `<button class="btn-coach" data-a="get-coach">⚡ OBTENIR MES CONSEILS PERSONNALISÉS</button>`}
    ${S.aiText?`<div class="ai-card"><div class="ai-head">🤖 CONSEILS DU COACH</div>${h(S.aiText)}</div>`:''}`;

  let overlay = '';
  if (S.confirmDel?.type==='session') {
    const s = revSess[S.confirmDel.idx];
    overlay = confirmOverlay(`Supprimer cette séance ?<br><b>${s?.date||''} — ${s?.kg||''} kg</b>`, 'del-sess-confirm');
  } else if (S.confirmDel?.type==='ex') {
    overlay = confirmOverlay(`Supprimer <b>${h(ex.name)}</b> et toutes ses séances ?`, 'del-ex-confirm');
  }

  return `
    <header class="header">
      <button class="back-btn" data-a="go-day">← RETOUR</button>
      <div class="header-info">
        <div class="htitle" style="font-size:14px">${h(ex.name)}</div>
        <div class="hsub" style="color:${m?.color}">${m?.label||''}</div>
      </div>
    </header>
    <div class="content">
      <div class="photo-zone" data-a="pick-photo">${photo}
        <div class="photo-badge">${ex.photo?'Changer la photo':'+ Photo'}</div>
      </div>
      ${renameBar}
      ${alt?`<div class="alt-pill">🔄 <span>Machine indisponible ? Utilise : <b>${h(alt)}</b></span></div>`:''}
      <div class="slbl">📊 ENREGISTRER UNE SÉANCE</div>
      <div class="log-row">
        <div class="log-f"><label>POIDS (KG)</label>
          <input id="inp-kg" class="log-inp" type="number" inputmode="decimal" placeholder="${lastKg||'0'}" value="${h(IN.kg)}">
        </div>
        <div class="log-f"><label>REPS</label>
          <input id="inp-reps" class="log-inp" type="number" inputmode="numeric" value="${h(IN.reps)}">
        </div>
        <div class="log-f"><label>SÉRIES</label>
          <input id="inp-sets" class="log-inp" type="number" inputmode="numeric" value="${h(IN.sets)}">
        </div>
      </div>
      <button class="btn-save" style="background:${m?.color||'#FF4500'}" data-a="save-session">✓ ENREGISTRER</button>
      ${hist}
      ${aiSection}
      <div class="slbl">⚠️ ZONE DANGER</div>
      <button class="btn-del-ex" data-a="ask-del-ex-here">🗑 SUPPRIMER CET EXERCICE</button>
      <div style="height:24px"></div>
    </div>
    ${overlay}`;
}

function confirmOverlay(msg, confirmAction) {
  return `<div class="overlay" data-a="close-overlay"><div class="sheet" data-stop>
    <div class="sheet-handle"></div>
    <div class="confirm-box">
      <div class="confirm-msg">${msg}</div>
      <div class="confirm-row">
        <button class="btn-cancel" data-a="close-overlay">Annuler</button>
        <button class="btn-danger" data-a="${confirmAction}">Supprimer</button>
      </div>
    </div>
  </div></div>`;
}

// ─── FIND HELPER ─────────────────────────────────────────────────────────────
function findEx(day, mk, eid) {
  const eidN = parseInt(eid);
  return (S.exs[`${day}__${mk}`]||[]).find(e=>e.id===eidN);
}
function updateActiveEx() {
  if (!S.activeEx || !S.activeDay) return;
  const k = exKey();
  const ex = (S.exs[k]||[]).find(e=>e.id===S.activeEx.id);
  if (ex) S.activeEx = {...ex, muscleKey:S.activeEx.muscleKey};
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function dispatch(action, data) {
  switch(action) {

    case 'hide-banner': S.showBanner=false; break;
    case 'open-settings': S.showSettings=true; break;
    case 'close-overlay': S.muscleMenu=null; S.addStep=null; S.addMuscle=null; S.confirmDel=null; S.showSettings=false; break;

    case 'save-apikey': {
      const k = document.getElementById('api-key-inp')?.value?.trim()||'';
      localStorage.setItem('bft_apikey', k);
      S.showSettings=false;
      break;
    }

    case 'open-mmenu': S.muscleMenu=data.day; break;
    case 'toggle-m': {
      const day=data.day, mk=data.mkey;
      const cur=S.weekPlan[day]||[];
      let next;
      if(mk==='rest'){next=['rest'];}
      else{const nr=cur.filter(k=>k!=='rest'); next=nr.includes(mk)?nr.filter(k=>k!==mk):[...nr,mk];}
      S.weekPlan[day]=next; saveData();
      render(); return;
    }

    case 'go-planner': S.screen='planner'; S.aiText=''; S.renaming=false; break;

    case 'open-day': {
      if (isRest(data.day)) break;
      S.activeDay=data.day; S.screen='day'; S.aiText='';
      break;
    }

    case 'open-ex': {
      const ex=findEx(data.day, data.mid, data.eid);
      if(!ex) break;
      S.activeDay=data.day; S.activeEx={...ex,muscleKey:data.mid};
      S.screen='exercise'; S.aiText=''; S.renaming=false; IN.rename=ex.name;
      break;
    }

    case 'go-day': S.screen='day'; S.aiText=''; S.renaming=false; break;

    case 'open-add-ex': {
      IN.custom='';
      const ms=dayMs(S.activeDay);
      if(ms.length===1){S.addMuscle=ms[0]; S.addStep='machine';}
      else S.addStep='muscle';
      break;
    }
    case 'pick-add-muscle': S.addMuscle=data.mkey; S.addStep='machine'; IN.custom=''; break;

    case 'add-ex': {
      const name=data.name;
      if(!name||!S.addMuscle) break;
      const k=`${S.activeDay}__${S.addMuscle}`;
      const ex={id:Date.now(), name, photo:null, sessions:[]};
      S.exs[k]=[...(S.exs[k]||[]),ex]; saveData();
      S.addStep=null; S.addMuscle=null; IN.custom='';
      break;
    }
    case 'add-ex-custom': {
      const name=(document.getElementById('custom-inp')?.value||IN.custom).trim();
      if(!name||!S.addMuscle) break;
      const k=`${S.activeDay}__${S.addMuscle}`;
      const ex={id:Date.now(), name, photo:null, sessions:[]};
      S.exs[k]=[...(S.exs[k]||[]),ex]; saveData();
      S.addStep=null; S.addMuscle=null; IN.custom='';
      break;
    }

    case 'ask-del-ex': {
      S.confirmDel={type:'ex-day', day:data.day, mid:data.mid, eid:data.eid};
      break;
    }
    case 'del-ex-confirm': {
      let k, eid;
      if(S.confirmDel?.type==='ex-day'){
        k=`${S.confirmDel.day}__${S.confirmDel.mid}`;
        eid=parseInt(S.confirmDel.eid);
        S.exs[k]=(S.exs[k]||[]).filter(e=>e.id!==eid); saveData();
        S.confirmDel=null;
      } else if(S.confirmDel?.type==='ex'){
        k=exKey(); eid=S.activeEx?.id;
        S.exs[k]=(S.exs[k]||[]).filter(e=>e.id!==eid); saveData();
        S.confirmDel=null; S.screen='day';
      }
      break;
    }

    case 'start-rename': S.renaming=true; IN.rename=S.activeEx?.name||''; break;
    case 'cancel-rename': S.renaming=false; break;
    case 'do-rename': {
      const v=(document.getElementById('rename-inp')?.value||IN.rename).trim();
      if(!v||!S.activeEx) break;
      const k=exKey();
      S.exs[k]=(S.exs[k]||[]).map(e=>e.id===S.activeEx.id?{...e,name:v}:e);
      saveData(); updateActiveEx(); S.renaming=false;
      break;
    }

    case 'save-session': {
      const kg=parseFloat(document.getElementById('inp-kg')?.value||IN.kg);
      const reps=parseInt(document.getElementById('inp-reps')?.value||IN.reps)||10;
      const sets=parseInt(document.getElementById('inp-sets')?.value||IN.sets)||3;
      if(!kg||!S.activeEx) break;
      const k=exKey();
      const sess={date:new Date().toLocaleDateString('fr-FR'), kg, reps, sets};
      S.exs[k]=(S.exs[k]||[]).map(e=>e.id===S.activeEx.id?{...e,sessions:[...e.sessions,sess]}:e);
      saveData(); updateActiveEx();
      IN.kg='';
      break;
    }

    case 'ask-del-sess': S.confirmDel={type:'session', idx:parseInt(data.idx)}; break;
    case 'del-sess-confirm': {
      if(S.confirmDel?.type!=='session'||!S.activeEx) break;
      const k=exKey(), sessions=[...S.activeEx.sessions];
      sessions.splice(sessions.length-1-S.confirmDel.idx,1);
      S.exs[k]=(S.exs[k]||[]).map(e=>e.id===S.activeEx.id?{...e,sessions}:e);
      saveData(); updateActiveEx(); S.confirmDel=null;
      break;
    }

    case 'ask-del-ex-here': S.confirmDel={type:'ex'}; break;

    case 'pick-photo':
      document.getElementById('photo-input')?.click();
      return;

    case 'get-coach':
      getCoachAdvice();
      return;

    default: return;
  }
  render();
}

// ─── AI COACH ────────────────────────────────────────────────────────────────
async function getCoachAdvice() {
  const apiKey = localStorage.getItem('bft_apikey')||'';
  if (!apiKey) {
    S.aiText = '⚠️ Clé API manquante.\n\nAppuie sur ⚙️ en haut du planning pour entrer ta clé API Anthropic (console.anthropic.com).';
    render(); return;
  }
  S.aiLoading=true; S.aiText=''; render();
  const ex=S.activeEx, m=getM(ex.muscleKey);
  const sessions=ex.sessions.slice(-5);
  const alt=machAlt();
  const prompt=`Tu es coach expert en musculation pour Basic Fit. Réponds en français, motivant et précis. Tutoie-moi.

Machine : ${ex.name}
Muscle : ${m?.label}
${sessions.length>0
  ?`Historique ${sessions.length} dernières séances :\n${sessions.map(s=>`• ${s.date} — ${s.kg}kg × ${s.reps} rép × ${s.sets} séries`).join('\n')}`
  :'Aucune séance enregistrée.'}
${alt?`Alternative Basic Fit si machine indisponible : ${alt}`:''}

4 points numérotés :
1. Analyse progression (ou conseils démarrage si 0 séance)
2. Quand et combien augmenter le poids — précis en kg
3. Conseil technique clé (2 phrases max)
4. ${alt?`Alternative si machine prise : ${alt}`:'Fréquence et récupération'}
Max 200 mots. Pas de conseil médical.`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    if(data.error) S.aiText='Erreur API : '+data.error.message;
    else S.aiText=data.content?.[0]?.text||'Aucun conseil disponible.';
  } catch(e){ S.aiText='Erreur de connexion. Vérifie ta connexion internet.'; }
  S.aiLoading=false; render();
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  // Stop propagation from sheet to overlay
  if (e.target.closest('[data-stop]')) {
    const el = e.target.closest('[data-a]');
    if (el) { e.stopPropagation(); dispatch(el.dataset.a, el.dataset); }
    return;
  }
  // Close overlay if clicking background
  if (e.target.classList.contains('overlay')) { dispatch('close-overlay',{}); return; }
  const el = e.target.closest('[data-a]');
  if (el) dispatch(el.dataset.a, el.dataset);
});

// Sync input values to IN without re-rendering
document.addEventListener('input', e => {
  const id = e.target.id;
  if (id==='inp-kg')    IN.kg=e.target.value;
  if (id==='inp-reps')  IN.reps=e.target.value;
  if (id==='inp-sets')  IN.sets=e.target.value;
  if (id==='custom-inp') IN.custom=e.target.value;
  if (id==='rename-inp') IN.rename=e.target.value;
  // Enable/disable custom add button
  if (id==='custom-inp') {
    const btn=document.getElementById('btn-custom-add');
    if(btn) btn.disabled=!e.target.value.trim();
  }
});

// Photo
document.getElementById('photo-input').addEventListener('change', async e => {
  const file=e.target.files[0];
  if(!file||!S.activeEx) return;
  const compressed=await compressImage(file);
  const k=exKey();
  S.exs[k]=(S.exs[k]||[]).map(ex=>ex.id===S.activeEx.id?{...ex,photo:compressed}:ex);
  saveData(); updateActiveEx(); render();
  e.target.value='';
});

// ─── INIT ────────────────────────────────────────────────────────────────────
load();
render();
</script>
